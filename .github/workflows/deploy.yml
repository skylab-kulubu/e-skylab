name: e-skylab ci

on:
  push:
    tags:
      - 'gateway/v*'
      - 'eureka/v*'

jobs:
  gateway-build:
    if: startsWith(github.ref, 'refs/tags/gateway/')
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v3

      - name: Extract Clean Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/gateway/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./gateway
          push: true
          tags: |
            ghcr.io/skylab-kulubu/e-skylab-gateway:latest
            ghcr.io/skylab-kulubu/e-skylab-gateway:${{ steps.get_version.outputs.VERSION }}

  eureka-build:
    if: startsWith(github.ref, 'refs/tags/eureka/')
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v3

      - name: Extract Clean Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/eureka/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Eureka
        uses: docker/build-push-action@v4
        with:
          context: ./eureka
          push: true
          tags: |
            ghcr.io/skylab-kulubu/e-skylab-eureka:latest
            ghcr.io/skylab-kulubu/e-skylab-eureka:${{ steps.get_version.outputs.VERSION }}